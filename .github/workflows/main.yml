name: Sync ServiceChannel to Smartsheet

on:
  schedule:
    # This runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests pandas smartsheet-python-sdk

    - name: Run sync script
      env:
        # This pulls your keys from the "Secrets" vault into the script
        SC_CLIENT_ID: ${{ secrets.SC_CLIENT_ID }}
        SC_CLIENT_SECRET: ${{ secrets.SC_CLIENT_SECRET }}
        SC_USERNAME: ${{ secrets.SC_USERNAME }}
        SC_PASSWORD: ${{ secrets.SC_PASSWORD }}
        SS_TOKEN: ${{ secrets.SS_TOKEN }}
        SS_SHEET_ID: ${{ secrets.SS_SHEET_ID }}
      run: python sync_script.py
